            "notebook-3,retrieval" "$M3")
          ISSUE_NUMBERS+=("$N")
          echo "  #$N [N3] Intelligent Metadata Filtering"

          # Save all issue numbers
          printf '%s\n' "${ISSUE_NUMBERS[@]}" > /tmp/issue_numbers.txt
          echo "numbers=$(IFS=,; echo "${ISSUE_NUMBERS[*]}")" >> "$GITHUB_OUTPUT"
          echo ""
          echo "✅ Created ${#ISSUE_NUMBERS[@]} issues"

      # ─────────────────────────────────────────────────────────────────
      # 4. GITHUB PROJECT v2  (requires PROJECT_TOKEN with 'project' scope)
      # ─────────────────────────────────────────────────────────────────
      - name: Create GitHub Project v2 and add issues
        if: ${{ inputs.skip_project != 'true' && secrets.PROJECT_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NUMBERS: ${{ steps.issues.outputs.numbers }}
        run: |
          OWNER="${REPO%%/*}"

          # ── Create project ─────────────────────────────────────────
          echo "Creating GitHub Project v2…"
          PROJECT_DATA=$(gh api graphql -f query='
            mutation($owner: String!, $title: String!) {
              createProjectV2(input: {ownerId: $owner, title: $title}) {
                projectV2 { id number url }
              }
            }' \
            -f owner="$(gh api graphql -f query='query($login:String!){user(login:$login){id}}' \
              -f login="$OWNER" --jq '.data.user.id')" \
            -f title="VolleyBall RAG Implementation" \
            --jq '.data.createProjectV2.projectV2')

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.id')
          PROJECT_URL=$(echo "$PROJECT_DATA" | jq -r '.url')
          echo "  Project: $PROJECT_URL  (id=$PROJECT_ID)"

          # ── Add Status field options ────────────────────────────────
          echo "Adding Status field options…"
          STATUS_FIELD_ID=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField { id name }
                    }
                  }
                }
              }
            }' -f projectId="$PROJECT_ID" \
            --jq '.data.node.fields.nodes[] | select(.name=="Status") | .id')

          # ── Create Notebook single-select field ────────────────────
          echo "Creating Notebook field…"
          NOTEBOOK_FIELD_ID=$(gh api graphql -f query='
            mutation($projectId: ID!, $name: String!, $dataType: ProjectV2CustomFieldType!) {
              createProjectV2Field(input: {projectId: $projectId, name: $name, dataType: $dataType}) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField { id }
                }
              }
            }' \
            -f projectId="$PROJECT_ID" \
            -f name="Notebook" \
            -f dataType="SINGLE_SELECT" \
            --jq '.data.createProjectV2Field.projectV2Field.id' 2>/dev/null || echo "")

          # ── Get repo ID ────────────────────────────────────────────
          REPO_ID=$(gh api "repos/$REPO" --jq '.id')

          # ── Add each issue to the project ──────────────────────────
          echo "Adding issues to project…"
          IFS=',' read -ra NUMS <<< "$ISSUE_NUMBERS"
          ITEM_IDS=()
          for NUM in "${NUMS[@]}"; do
            ISSUE_NODE_ID=$(gh api "repos/$REPO/issues/$NUM" --jq '.node_id')
            ITEM_ID=$(gh api graphql -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }' \
              -f projectId="$PROJECT_ID" \
              -f contentId="$ISSUE_NODE_ID" \
              --jq '.data.addProjectV2ItemById.item.id' 2>/dev/null || echo "")
            [ -n "$ITEM_ID" ] && ITEM_IDS+=("$ITEM_ID") && echo "  Added issue #$NUM (item=$ITEM_ID)"
          done

          echo ""
          echo "✅ GitHub Project v2 created: $PROJECT_URL"
          echo "   Issues added: ${#ITEM_IDS[@]} / ${#NUMS[@]}"

      - name: Print setup summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════"
          echo " VolleyBall RAG — Setup Summary"
          echo "════════════════════════════════════════════════"
          echo ""
          echo "Issues created: $(wc -l < /tmp/issue_numbers.txt 2>/dev/null || echo 0)"
          echo ""
          if [ "${{ secrets.PROJECT_TOKEN }}" = "" ] && [ "${{ inputs.skip_project }}" != "true" ]; then
            echo "⚠️  GitHub Project v2 was NOT created."
            echo "   To create the project board, add a repository secret named"
            echo "   PROJECT_TOKEN containing a GitHub Personal Access Token with"
            echo "   the 'project' OAuth scope, then re-run this workflow."
            echo ""
            echo "   How to create the token:"
            echo "   1. Go to github.com → Settings → Developer settings"
            echo "   2. Personal access tokens → Fine-grained tokens (or classic)"
            echo "   3. Classic token: tick the 'project' scope"
            echo "   4. Copy the token"
            echo "   5. Go to this repo → Settings → Secrets and variables → Actions"
            echo "   6. Add secret named: PROJECT_TOKEN"
          fi
          echo ""
          echo "All labels, milestones, and issues have been created."
          echo "View issues at: https://github.com/${{ github.repository }}/issues"
